version: 2

project_name: spruce

before:
  hooks:
    - go mod tidy

builds:
  - id: spruce
    main: .
    binary: spruce
    env:
      - CGO_ENABLED=0
    goos:
      # brew is macOS+Linux; snap/flatpak/PackageKit are Linux-only. Those two
      # OSes cover every backend.
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X go.dalton.dog/spruce/cmd.Version={{.Version}}

homebrew_casks:
  - name: prism
    homepage: "https://dalton.dog/prism"

    commit_author:
      name: DaltonDogBot
      email: "bot@dalton.dog"

    repository:
      owner: DaltonSW
      name: homebrew-tap
      branch: main
      token: "{{ .Env.GITHUB_TOKEN }}"

archives:
  - formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
